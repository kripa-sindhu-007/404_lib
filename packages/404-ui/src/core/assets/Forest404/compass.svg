<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="fr-compass-face" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#f1e8d4" stop-opacity="0.95" />
      <stop offset="55%" stop-color="#d6a04a" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#3a2d1f" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="fr-compass-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a4633" />
      <stop offset="50%" stop-color="#3a2d1f" />
      <stop offset="100%" stop-color="#1c130b" />
    </linearGradient>
  </defs>
  <!-- Outer brass rim -->
  <circle cx="60" cy="60" r="56" fill="url(#fr-compass-rim)" stroke="#1a120a" stroke-width="1.5" />
  <circle cx="60" cy="60" r="49" fill="url(#fr-compass-face)" stroke="rgba(58,45,31,0.85)" stroke-width="2" />
  <!-- Cardinal hairlines -->
  <g stroke="rgba(58,45,31,0.55)" stroke-width="0.7">
    <line x1="60" y1="14" x2="60" y2="106" />
    <line x1="14" y1="60" x2="106" y2="60" />
  </g>
  <!-- Cardinal labels -->
  <g fill="#3a2d1f" font-family="Georgia, serif" font-size="8" font-weight="700" text-anchor="middle">
    <text x="60" y="26">N</text>
    <text x="60" y="100">S</text>
    <text x="98" y="63">E</text>
    <text x="22" y="63">W</text>
  </g>
  <!-- Tick marks every 15 degrees -->
  <g stroke="rgba(58,45,31,0.7)" stroke-width="0.6">
    <g transform="rotate(15 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(30 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(45 60 60)"><line x1="60" y1="16" x2="60" y2="20" /></g>
    <g transform="rotate(60 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(75 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(105 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(120 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(135 60 60)"><line x1="60" y1="16" x2="60" y2="20" /></g>
    <g transform="rotate(150 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(165 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(195 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(210 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(225 60 60)"><line x1="60" y1="16" x2="60" y2="20" /></g>
    <g transform="rotate(240 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(255 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(285 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(300 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(315 60 60)"><line x1="60" y1="16" x2="60" y2="20" /></g>
    <g transform="rotate(330 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
    <g transform="rotate(345 60 60)"><line x1="60" y1="16" x2="60" y2="22" /></g>
  </g>
  <!-- Needle -->
  <g class="forest-404-compass-needle">
    <!-- North half (rust red) -->
    <path d="M60 18 L66 60 L60 64 L54 60 Z" fill="#b85a2c" stroke="#3a2d1f" stroke-width="0.6" />
    <!-- South half (pewter) -->
    <path d="M60 102 L66 60 L60 56 L54 60 Z" fill="#cddccd" stroke="#3a2d1f" stroke-width="0.6" />
  </g>
  <!-- Center pivot -->
  <circle cx="60" cy="60" r="3.5" fill="#1a120a" stroke="#d6a04a" stroke-width="1" />
  <circle cx="60" cy="60" r="1.2" fill="#f7e57f" />
</svg>
