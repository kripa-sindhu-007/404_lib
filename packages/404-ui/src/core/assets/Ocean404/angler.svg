<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" fill="none" aria-hidden="true">
  <path
    d="M10 20 Q14 6 32 8 Q54 10 68 20 Q54 30 32 32 Q14 34 10 20 Z"
    fill="#021126"
    stroke="rgba(126,240,255,0.4)"
    stroke-width="0.8"
  />
  <path d="M68 20 L80 14 L74 20 L80 26 Z" fill="#021126" stroke="rgba(126,240,255,0.3)" stroke-width="0.6" />
  <!-- Lure stalk -->
  <path d="M18 12 Q10 4 4 8" stroke="rgba(126,240,255,0.5)" stroke-width="0.8" fill="none" stroke-linecap="round" />
  <!-- Glowing lure -->
  <circle cx="4" cy="8" r="3" fill="#7ef0ff">
    <animate attributeName="r" values="2.5;3.4;2.5" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="4" cy="8" r="6" fill="#7ef0ff" opacity="0.25" />
  <!-- Teeth -->
  <path d="M18 22 L20 25 L22 22 L24 25 L26 22" stroke="#e6fffa" stroke-width="0.6" fill="none" />
  <!-- Eye -->
  <circle cx="24" cy="16" r="1.2" fill="#7ef0ff" />
</svg>
