<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="sp-orbit-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7cff4a" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#7cff4a" stop-opacity="0" />
    </radialGradient>
    <pattern id="sp-orbit-ticks" x="0" y="0" width="8" height="1" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#7cff4a" fill-opacity="0.6" />
    </pattern>
  </defs>

  <!-- Faint phosphor haze at center (planet) -->
  <circle cx="160" cy="90" r="70" fill="url(#sp-orbit-glow)" />
  <circle cx="160" cy="90" r="18" fill="none" stroke="#7cff4a" stroke-opacity="0.55" stroke-width="1" stroke-dasharray="2 3" />
  <circle cx="160" cy="90" r="7" fill="#7cff4a" fill-opacity="0.85" />

  <!-- Intended trajectory (solid) -->
  <g class="sp-orbit-intended">
    <ellipse cx="160" cy="90" rx="130" ry="58" fill="none" stroke="#7cff4a" stroke-opacity="0.55" stroke-width="1" />
    <!-- Target marker on intended orbit -->
    <g transform="translate(284, 90)">
      <circle r="4" fill="none" stroke="#7cff4a" stroke-width="1" />
      <line x1="-7" y1="0" x2="-4" y2="0" stroke="#7cff4a" stroke-width="1" />
      <line x1="4" y1="0" x2="7" y2="0" stroke="#7cff4a" stroke-width="1" />
      <line x1="0" y1="-7" x2="0" y2="-4" stroke="#7cff4a" stroke-width="1" />
      <line x1="0" y1="4" x2="0" y2="7" stroke="#7cff4a" stroke-width="1" />
      <text x="10" y="3" fill="#7cff4a" font-family="monospace" font-size="8" letter-spacing="1">INTENDED</text>
    </g>
  </g>

  <!-- Off-nominal trajectory (dashed, red) -->
  <g class="sp-orbit-offnominal">
    <ellipse cx="148" cy="96" rx="120" ry="70" fill="none" stroke="#ff3d3d" stroke-opacity="0.75" stroke-width="1" stroke-dasharray="3 3" transform="rotate(-14 160 90)" />
  </g>

  <!-- Axis crosshair -->
  <g stroke="#7cff4a" stroke-opacity="0.35" stroke-width="0.5" stroke-dasharray="2 3">
    <line x1="0" y1="90" x2="320" y2="90" />
    <line x1="160" y1="0" x2="160" y2="180" />
  </g>

  <!-- Angle ticks around the planet -->
  <g fill="none" stroke="#7cff4a" stroke-opacity="0.35" stroke-width="0.5">
    <line x1="160" y1="22" x2="160" y2="30" />
    <line x1="160" y1="150" x2="160" y2="158" />
    <line x1="28" y1="90" x2="38" y2="90" />
    <line x1="282" y1="90" x2="292" y2="90" />
  </g>

  <!-- Spacecraft dot on the off-nominal arc -->
  <g class="sp-orbit-craft" transform="translate(60, 144)">
    <circle r="9" fill="none" stroke="#ff3d3d" stroke-opacity="0.5" stroke-width="1">
      <animate attributeName="r" values="8;14;8" dur="2.4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.55;0.1;0.55" dur="2.4s" repeatCount="indefinite" />
    </circle>
    <circle r="4" fill="#ff3d3d" />
    <line x1="-9" y1="0" x2="-14" y2="0" stroke="#ff3d3d" stroke-width="1" />
    <text x="10" y="4" fill="#ff3d3d" font-family="monospace" font-size="8" letter-spacing="1">OFF-NOMINAL</text>
  </g>

  <!-- Label -->
  <g font-family="monospace" font-size="7" letter-spacing="1.5">
    <text x="8" y="14" fill="#ffb547" opacity="0.8">TRAJECTORY DIAGNOSTIC</text>
    <text x="8" y="172" fill="#7cff4a" opacity="0.55">Δv 404.2 km · t+00:404</text>
  </g>
</svg>
