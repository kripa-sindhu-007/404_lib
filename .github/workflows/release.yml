name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Node 24 ships with npm 11.x out of the box, which is the minimum
      # version that includes a working `npm publish` over OIDC for
      # Trusted Publishing. Node 22 LTS still bundles npm 10.x, and
      # in-place self-upgrades (`npm install -g npm@11 [--force]`) hit
      # a known race condition that crashes with `Cannot find module
      # 'promise-retry'`. Switching to node 24 sidesteps the upgrade
      # dance entirely.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm version meets Trusted Publishing requirement
        run: |
          NPM_VER=$(npm --version)
          echo "npm version: $NPM_VER"
          # npm 11.5+ ships the publish-over-OIDC code path
          MAJOR=${NPM_VER%%.*}
          if [ "$MAJOR" -lt 11 ]; then
            echo "::error::npm $NPM_VER is too old for Trusted Publishing; need >= 11.5"
            exit 1
          fi

      - name: Debug — dump OIDC token claims for npm:registry.npmjs.org audience
        run: |
          set +e
          RESP=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org")
          TOKEN=$(echo "$RESP" | jq -r '.value // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::Could not obtain OIDC token. Response: $RESP"
            exit 0
          fi
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          # base64url -> base64 + padding
          PAYLOAD=$(echo "$PAYLOAD" | tr '_-' '/+')
          PAD=$(( (4 - ${#PAYLOAD} % 4) % 4 ))
          for _ in $(seq 1 $PAD); do PAYLOAD="${PAYLOAD}="; done
          echo "=== OIDC claims for audience=npm:registry.npmjs.org ==="
          echo "$PAYLOAD" | base64 -d 2>/dev/null | jq '{
            sub,
            aud,
            repository,
            repository_owner,
            repository_id,
            workflow,
            workflow_ref,
            workflow_sha,
            job_workflow_ref,
            ref,
            ref_type,
            environment,
            event_name,
            actor,
            actor_id,
            run_id
          }'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # npm Trusted Publishing via the workflow's `id-token: write`
          # permission — no NPM token needed. Provenance is auto-attested.
          NPM_CONFIG_PROVENANCE: "true"
