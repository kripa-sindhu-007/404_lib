name: Feature Request
description: Suggest a new template, framework integration, or improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or improvement you would like to see.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New 404 template
        - React
        - Vue
        - Vanilla JavaScript
        - Documentation
        - Build or release workflow
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternatives or workarounds you have considered.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add examples, sketches, references, or related issues.
