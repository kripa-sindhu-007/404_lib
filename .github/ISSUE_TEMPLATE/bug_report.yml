name: Bug Report
description: Report a reproducible problem in 404-UI.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include enough detail for maintainers to reproduce it.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide a minimal reproduction, repository link, or step-by-step instructions.
      placeholder: |
        1. Install @kripa006/404-ui
        2. Import ...
        3. Render ...
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - React
        - Vue
        - Vanilla JavaScript
        - Documentation site
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "@kripa006/404-ui@0.0.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include browser, OS, Node.js version, bundler, and package manager where relevant.
      placeholder: |
        Browser:
        OS:
        Node.js:
        Bundler:
        Package manager:
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, logs, or any other details that help explain the issue.
